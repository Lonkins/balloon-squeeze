name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  bsq:
    name: bsq (lint, types, tests)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,providers]"
      - name: Lint (ruff)
        run: ruff check src tests
      - name: Types (mypy --strict)
        run: mypy src tests
      - name: Tests (pytest)
        run: pytest -q

  noisyjudge:
    name: noisyjudge (lint, types, tests)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        working-directory: packages/noisyjudge
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install ruff mypy pytest
      - name: Lint (ruff)
        working-directory: packages/noisyjudge
        run: ruff check src tests
      - name: Types (mypy --strict)
        working-directory: packages/noisyjudge
        run: mypy
      - name: Tests (pytest)
        working-directory: packages/noisyjudge
        run: pytest -q
